<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Go Server Example</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Static file server</p>
      <h1>Go Server Example</h1>
      <p class="summary">This page is served from a configured project folder.</p>
      <button id="load-data" type="button">Load project data</button>
    </section>
    <section class="panel">
      <h2>Project data</h2>
      <pre id="output">Click the button to fetch data.json.</pre>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
