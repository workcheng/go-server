<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生产监控场景原型</title>
    <link rel="stylesheet" href="./styles.css?v=20260606-scene3-legacy-2d-v6" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="./assets/ui/sketch/020.png" alt="COMAC" />
          <div class="brand-copy">
            <h1>民机系统化制造交付运营全过程数字飞机平台</h1>
            <small>场景3 · 生产监控工作台</small>
          </div>
        </div>

        <nav class="main-nav" id="mainNav"></nav>

        <div class="topbar-side">
          <div class="time-box">
            <span id="clock">00:00:00</span>
            <span id="today">2026-06-05</span>
          </div>
          <button class="icon-button" id="noticeButton" type="button" aria-label="消息通知">
            <img src="./assets/ui/bell.png" alt="" />
            <i id="noticeBadge">3</i>
          </button>
          <button class="user-entry" id="userEntry" type="button" aria-haspopup="true" aria-expanded="false">
            <img src="./assets/ui/avatar.png" alt="" />
            <div>
              <b>Admin</b>
              <span>系统管理员</span>
            </div>
            <em>⌄</em>
          </button>
        </div>
      </header>

      <main class="monitor-canvas">
        <section class="command-strip">
          <div class="strip-group level-group" id="levelSwitch"></div>
          <div class="strip-group scope-group" id="scopeFilters"></div>
          <div class="strip-group view-group" id="viewTabs"></div>
        </section>

        <section class="workbench">
          <aside class="left-rail">
            <section class="panel object-card">
              <div class="panel-title">
                <div>
                  <span>当前上下文</span>
                  <h2 id="scopeTitle">厂房级总览</h2>
                </div>
                <button class="icon-pill" id="backButton" type="button">返回</button>
              </div>
              <div class="crumbs" id="crumbs"></div>
              <p id="scopeSummary"></p>
              <div class="mini-kpis" id="scopeKpis"></div>
            </section>

            <section class="panel element-panel">
              <div class="panel-title tight">
                <div>
                  <span>旧平台生产要素</span>
                  <h2>业务视角</h2>
                </div>
                <button class="icon-pill" id="legacyMapButton" type="button">映射</button>
              </div>
              <div class="element-menu" id="elementMenu"></div>
            </section>

            <section class="panel scenario-card">
              <div class="panel-title tight">
                <div>
                  <span>典型闭环</span>
                  <h2>业务测试场景</h2>
                </div>
                <button class="icon-pill" id="scenarioMore" type="button">全部</button>
              </div>
              <div class="scenario-list" id="scenarioList"></div>
            </section>
          </aside>

          <section class="main-stage">
            <section class="hero-band" id="heroBand"></section>

            <section class="stage-board">
              <div class="stage-head">
                <div>
                  <span id="stageEyebrow">二维生产监控</span>
                  <h2 id="stageTitle">厂房级总览</h2>
                  <p id="stageSubtitle"></p>
                </div>
                <div class="board-actions" id="boardActions"></div>
              </div>
              <section class="stage-content" id="stageContent"></section>
            </section>

            <section class="bottom-board">
              <div class="board-tabbar" id="bottomTabs"></div>
              <div class="bottom-content" id="bottomContent"></div>
            </section>
          </section>

          <aside class="right-drawer">
            <div class="drawer-tabs" id="drawerTabs"></div>
            <section class="panel drawer-panel" id="drawerPanel"></section>
          </aside>
        </section>
      </main>

      <section class="modal" id="modal" aria-hidden="true" hidden>
        <div class="modal-card">
          <div class="modal-head">
            <div>
              <span id="modalKicker">生产监控</span>
              <h3 id="modalTitle">详情</h3>
            </div>
            <button type="button" id="modalClose" aria-label="关闭">×</button>
          </div>
          <div class="modal-meta" id="modalMeta"></div>
          <p id="modalDesc"></p>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-actions" id="modalActions"></div>
        </div>
      </section>

      <section class="user-menu" id="userMenu" aria-hidden="true" hidden>
        <div class="user-card">
          <strong>Admin</strong>
          <span>系统管理员</span>
          <small>场景3 / 生产监控</small>
        </div>
        <button type="button" data-user-action="profile">用户信息</button>
        <button type="button" data-user-action="password">修改密码</button>
        <button type="button" data-user-action="logout">退出登录</button>
      </section>

      <div class="status-toast" id="statusToast" aria-live="polite"></div>
    </div>

    <script src="./app.js?v=20260606-scene3-legacy-2d-v6" type="module"></script>
  </body>
</html>
