name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'   # 当推送形如 v1.0.0, v2.1.3 的标签时触发

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests (optional, but recommended)
        run: go test ./...

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o go-server-linux-amd64
          GOOS=windows GOARCH=amd64 go build -o go-server-windows-amd64.exe
          GOOS=darwin GOARCH=amd64 go build -o go-server-darwin-amd64

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}   # 显式指定
          files: |
            go-server-linux-amd64
            go-server-windows-amd64.exe
            go-server-darwin-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
